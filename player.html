<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>KP Player</title>

<style>

html, body {
    margin:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

#player {
    width:100%;
    height:100%;
    border:none;
}

</style>
</head>

<body>

<iframe
    id="player"
    allowfullscreen>
</iframe>

<script>

const params = new URLSearchParams(location.search);

const kpId = params.get("id");

if (!kpId) {
    document.body.innerHTML =
      "<h1 style='color:white'>Нет ID фильма</h1>";
}

// ==================================================
// ВАЖНО
// Здесь вставишь свой источник плеера
// ==================================================

const playerUrl =
  `https://YOUR-PLAYER/embed/kp/${kpId}`;

// ==================================================

document
  .getElementById("player")
  .src = playerUrl;

</script>

</body>
</html>
