<script>

const params = new URLSearchParams(location.search);

const kpId = params.get("id");

if (!kpId) {

    document.body.innerHTML =
      "<h1 style='color:white'>Нет ID фильма</h1>";

    throw new Error("No KP ID");
}

// =====================================
// Tape Operator
// =====================================

const playerUrl =
 `https://tapeop.dev/#/kp/${kpId}`;

document
  .getElementById("player")
  .src = playerUrl;

</script>
