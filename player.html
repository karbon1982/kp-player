<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>KP Player</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
}
</style>
</head>

<body>

<script>
// читаем ID Кинопоиска из URL
const params = new URLSearchParams(location.search);
const kpId = params.get("id");

// если нет ID — показываем ошибку
if (!kpId) {
    document.body.innerHTML =
        "<h1 style='color:white;font-family:sans-serif'>Нет ID фильма</h1>";
    throw new Error("No KP ID");
}

// Tape Operator base URL
const PLAYER_URL = "https://tapeop.dev/";

// ВАЖНО:
// Tape Operator использует hash-routing
// поэтому передаём ID так:
const finalUrl = `${PLAYER_URL}#/kp/${kpId}`;

// редирект на плеер
window.location.replace(finalUrl);
</script>

</body>
</html>
