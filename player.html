<script>
const params = new URLSearchParams(location.search);
const kpId = params.get("id");

if (!kpId) {
    document.body.innerHTML =
        "<h1 style='color:white'>Нет ID фильма</h1>";
    throw new Error("No KP ID");
}

// главный фикс
const PLAYER_URL = 'https://tapeop.dev/';

// передаём через query string (самый стабильный вариант)
const finalUrl = `${PLAYER_URL}?kp=${kpId}`;

// редирект
window.location.href = finalUrl;
</script>
