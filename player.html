<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>KP Player</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
}
#dplayer {
    width: 100%;
    height: 100%;
}
</style>

<!-- DPlayer -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.css">
</head>

<body>

<div id="dplayer"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/dplayer/dist/DPlayer.min.js"></script>

<script>
// =========================
// 1. получаем KP ID
// =========================
const params = new URLSearchParams(location.search);
const kpId = params.get("id");

if (!kpId) {
    document.body.innerHTML = "<h1 style='color:white'>Нет ID фильма</h1>";
    throw new Error("No KP ID");
}

// =========================
// 2. ВРЕМЕННЫЙ СТРИМ (пример)
// =========================
// сюда потом подключишь свой источник / API
const videoUrl = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";

// =========================
// 3. создаём плеер
// =========================
const dp = new DPlayer({
    container: document.getElementById('dplayer'),
    video: {
        url: videoUrl,
        type: 'hls'
    }
});

console.log("KP ID:", kpId);
</script>

</body>
</html>
